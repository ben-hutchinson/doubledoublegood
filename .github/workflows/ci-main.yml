name: Main CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-main:
    name: Test and Build
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production dependency audit
        id: npm_audit
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high --json > npm-audit-report.json

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

      - name: Fail on high or critical production vulnerabilities
        if: steps.npm_audit.outcome == 'failure'
        run: exit 1

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run test suite
        run: npm test

      - name: Run production build
        run: npm run build
